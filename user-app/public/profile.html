<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>My Profile – MedCare HMS</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div id="authNav"></div>

    <div
        style="background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:calc(var(--nav-h) + 40px) 0 40px;">
        <div class="container">
            <div class="section-label" style="color:rgba(255,255,255,.5)">Account</div>
            <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:36px;font-weight:800;margin-bottom:8px;">My
                Profile</h1>
            <p style="opacity:.6;font-size:16px;">Manage your personal and medical details</p>
        </div>
    </div>

    <div class="section-sm">
        <div class="container">
            <div style="max-width:760px;margin:0 auto;">
                <div class="profile-hero">
                    <div class="profile-avatar-big" id="profileAvatar">H</div>
                    <div class="profile-hero-info">
                        <h2 id="profileName">Heena Bagwan</h2>
                        <p id="profileEmail">heena@user.com</p>
                        <p style="margin-top:6px;opacity:.7;font-size:13px;">Patient · MedCare HMS</p>
                    </div>
                </div>

                <div
                    style="background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);padding:32px;">
                    <h3 style="font-size:18px;font-weight:700;margin-bottom:24px;">Edit Information</h3>
                    <div id="successBanner" class="hidden"
                        style="background:#d1fae5;color:#065f46;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:600;margin-bottom:20px;">
                        ✅ Profile updated successfully!</div>
                    <form id="profileForm">
                        <div class="profile-form">
                            <div class="profile-field">
                                <label>Full Name</label>
                                <input type="text" id="fName" placeholder="Full name" />
                            </div>
                            <div class="profile-field">
                                <label>Email</label>
                                <input type="email" id="fEmail" placeholder="Email address" readonly
                                    style="background:var(--bg);cursor:not-allowed;" />
                            </div>
                            <div class="profile-field">
                                <label>Phone</label>
                                <input type="tel" id="fPhone" placeholder="+91 98000 00000" />
                            </div>
                            <div class="profile-field">
                                <label>Date of Birth</label>
                                <input type="date" id="fDob" />
                            </div>
                            <div class="profile-field">
                                <label>Blood Group</label>
                                <select id="fBlood">
                                    <option value="">Select</option>
                                    <option>A+</option>
                                    <option>A-</option>
                                    <option>B+</option>
                                    <option>B-</option>
                                    <option>AB+</option>
                                    <option>AB-</option>
                                    <option>O+</option>
                                    <option>O-</option>
                                </select>
                            </div>
                            <div class="profile-field">
                                <label>Gender</label>
                                <select id="fGender">
                                    <option value="">Select</option>
                                    <option>Male</option>
                                    <option>Female</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="profile-field full">
                                <label>Address</label>
                                <input type="text" id="fAddress" placeholder="Full address" />
                            </div>
                            <div class="profile-field full">
                                <label>Emergency Contact</label>
                                <input type="text" id="fEmergency" placeholder="Emergency contact name & number" />
                            </div>
                        </div>
                        <div style="margin-top:28px;display:flex;gap:12px;">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <button type="button" class="btn btn-outline" onclick="loadProfile()">Discard</button>
                        </div>
                    </form>
                </div>

                <!-- Danger Zone -->
                <div
                    style="background:var(--card);border-radius:var(--radius);border:1.5px solid #fecaca;padding:24px;margin-top:24px;">
                    <h3 style="font-size:16px;font-weight:700;color:var(--danger);margin-bottom:8px;">Account Actions
                    </h3>
                    <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px;">Permanently log out of your
                        patient portal session.</p>
                    <button class="btn-danger-sm" style="padding:10px 20px;font-size:14px;" onclick="logout()">🚪 Log
                        Out</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const user = getUser();
        renderAuthNav('profile');

        function loadProfile() {
            document.getElementById('fName').value = user.name || '';
            document.getElementById('fEmail').value = user.email || '';
            document.getElementById('fPhone').value = user.phone || '';
            document.getElementById('fDob').value = user.dob || '';
            document.getElementById('fBlood').value = user.bloodGroup || '';
            document.getElementById('fGender').value = user.gender || '';
            document.getElementById('fAddress').value = user.address || '';
            document.getElementById('fEmergency').value = user.emergencyContact || '';
            document.getElementById('profileName').textContent = user.name;
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('profileAvatar').textContent = user.name[0];
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const updated = { ...user, name: document.getElementById('fName').value, phone: document.getElementById('fPhone').value, dob: document.getElementById('fDob').value, bloodGroup: document.getElementById('fBlood').value, gender: document.getElementById('fGender').value, address: document.getElementById('fAddress').value, emergencyContact: document.getElementById('fEmergency').value };
            try {
                const res = await fetch(`/api/patients/${user.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updated) });
                const data = await res.json();
                if (data.success || res.ok) {
                    localStorage.setItem('hms_user', JSON.stringify(updated));
                    document.getElementById('successBanner').classList.remove('hidden');
                    document.getElementById('profileName').textContent = updated.name;
                    document.getElementById('profileAvatar').textContent = updated.name[0];
                    setTimeout(() => document.getElementById('successBanner').classList.add('hidden'), 3000);
                }
            } catch { showToast('Profile saved locally', 'var(--secondary)'); localStorage.setItem('hms_user', JSON.stringify({ ...user, name: document.getElementById('fName').value, phone: document.getElementById('fPhone').value })); }
        });

        loadProfile();
    </script>
</body>

</html>
