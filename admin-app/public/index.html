<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login – MedCare HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(160deg, #0a1628 0%, #112240 60%, #023e8a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrap {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-logo {
            text-align: center;
            color: #fff;
            margin-bottom: 32px;
        }

        .login-logo svg {
            margin-bottom: 12px;
        }

        .login-logo h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -.5px;
        }

        .login-logo p {
            font-size: 14px;
            opacity: .65;
            margin-top: 4px;
        }

        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3);
        }

        .admin-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fee2e2;
            color: #991b1b;
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 20px;
        }

        .login-card h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .login-card p {
            color: #6b7a8d;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .demo {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f0f4f8;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #223;
            margin-bottom: 22px;
        }

        .demo span.tag {
            background: #e63946;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: #6b7a8d;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: .2s;
        }

        .form-group input:focus {
            border-color: #e63946;
            box-shadow: 0 0 0 3px rgba(230, 57, 70, .12);
        }

        .err {
            background: #fee2e2;
            color: #991b1b;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 14px;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #e63946, #c1121f);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: .25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(230, 57, 70, .4);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .back-link {
            text-align: center;
            margin-top: 18px;
            color: rgba(255, 255, 255, .6);
            font-size: 13px;
        }

        .back-link a {
            color: #90caf9;
            font-weight: 600;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="login-wrap">
        <div class="login-logo">
            <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
                <rect width="52" height="52" rx="16" fill="white" fill-opacity="0.12" />
                <path d="M26 12v28M12 26h28" stroke="white" stroke-width="4.5" stroke-linecap="round" />
            </svg>
            <h1>MedCare HMS</h1>
            <p>Hospital Management System</p>
        </div>
        <div class="login-card">
            <div class="admin-tag">🔐 Admin Access</div>
            <h2>Administrator Login</h2>
            <p>Sign in to manage the hospital system</p>
            <div class="demo"><span class="tag">Demo</span> heena@admin.com &nbsp;/&nbsp; 1234</div>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="admin@hospital.com" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required />
                </div>
                <div id="loginErr" class="err hidden"></div>
                <button type="submit" class="btn" id="loginBtn">
                    <span id="btnText">Sign In as Admin</span>
                    <span id="btnSpinner" class="spinner hidden"></span>
                </button>
            </form>
        </div>
        <p class="back-link">Patient? <a href="http://localhost:3000">Go to Patient Portal →</a></p>
    </div>

    <script>
        // If already logged in, redirect
        if (localStorage.getItem('hms_admin')) window.location.href = '/admin/dashboard.html';

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginErr');
            document.getElementById('btnText').textContent = 'Signing in…';
            document.getElementById('btnSpinner').classList.remove('hidden');
            btn.disabled = true; err.classList.add('hidden');
            try {
                const res = await fetch('/admin/api/auth/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('hms_admin', JSON.stringify(data.admin));
                    localStorage.setItem('hms_admin_token', data.token);
                    window.location.href = '/admin/dashboard.html';
                } else { err.textContent = data.message || 'Login failed'; err.classList.remove('hidden'); }
            } catch { err.textContent = 'Server error. Please try again.'; err.classList.remove('hidden'); }
            finally { btn.disabled = false; document.getElementById('btnText').textContent = 'Sign In as Admin'; document.getElementById('btnSpinner').classList.add('hidden'); }
        });
    </script>
</body>

</html>
