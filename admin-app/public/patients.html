<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Patients – MedCare HMS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/admin.css" />
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-logo"><svg width="30" height="30" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="12" fill="white" fill-opacity="0.15" />
                    <path d="M24 10v28M10 24h28" stroke="white" stroke-width="4" stroke-linecap="round" />
                </svg>HMS Admin</div>
            <nav class="sidebar-nav">
                <span class="nav-section-title">Overview</span>
                <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                        <rect x="14" y="14" width="7" height="7" rx="1" />
                    </svg>Dashboard</a>
                <span class="nav-section-title">Management</span>
                <a href="doctors.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
                    </svg>Doctors</a>
                <a href="appointments.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>Appointments</a>
                <a href="patients.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>Patients</a>
                <a href="messages.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
                    </svg>Messages</a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="avatar-sm" id="sidebarAvatar">A</div>
                    <div style="flex:1;min-width:0">
                        <div class="sidebar-user-name" id="sidebarName">Admin</div>
                        <div class="sidebar-user-role">Administrator</div>
                    </div>
                    <button class="logout-btn" onclick="adminLogout()"><svg width="15" height="15" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                            <polyline points="16,17 21,12 16,7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg></button>
                </div>
            </div>
        </aside>

        <div class="main-content">
            <header class="topbar">
                <div class="topbar-title">
                    <h1>Patients</h1>
                    <p>View registered patient records</p>
                </div>
                <div class="topbar-right"><span class="topbar-badge">🔐 Admin</span></div>
            </header>
            <main class="page-content">
                <div class="card">
                    <div class="card-header">
                        <h3>All Patients (<span id="patCount">0</span>)</h3>
                        <input type="text" id="search" placeholder="Search by name or email…"
                            style="padding:8px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;width:240px;outline:none;font-family:inherit;" />
                    </div>
                    <div class="card-body" style="padding:0">
                        <div class="table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Patient</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                        <th>Blood Group</th>
                                        <th>DOB</th>
                                        <th>Address</th>
                                    </tr>
                                </thead>
                                <tbody id="patBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const admin = getAdmin();
        document.getElementById('sidebarName').textContent = admin.name;
        document.getElementById('sidebarAvatar').textContent = admin.name[0];

        let patients = [];

        async function load() {
            const res = await fetch('/admin/api/patients');
            const data = await res.json();
            patients = data.patients || [];
            render(patients);
        }

        function render(list) {
            document.getElementById('patCount').textContent = list.length;
            const body = document.getElementById('patBody');
            if (!list.length) { body.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted)">No patients found.</td></tr>'; return; }
            body.innerHTML = list.map(p => `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#0096c7,#2a9d8f);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;">${p.name[0]}</div>
            <div style="font-weight:600;">${p.name}</div>
          </div>
        </td>
        <td>${p.email}</td>
        <td>${p.phone || '—'}</td>
        <td><span class="badge badge-info">${p.bloodGroup || '—'}</span></td>
        <td>${p.dob || '—'}</td>
        <td>${p.address || '—'}</td>
      </tr>`).join('');
        }

        document.getElementById('search').addEventListener('input', function () {
            const q = this.value.toLowerCase();
            render(q ? patients.filter(p => p.name.toLowerCase().includes(q) || p.email.toLowerCase().includes(q)) : patients);
        });

        load();
    </script>
</body>

</html>
