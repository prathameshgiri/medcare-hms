<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Appointments – MedCare HMS Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/admin.css" />
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-logo"><svg width="30" height="30" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="12" fill="white" fill-opacity="0.15" />
                    <path d="M24 10v28M10 24h28" stroke="white" stroke-width="4" stroke-linecap="round" />
                </svg>HMS Admin</div>
            <nav class="sidebar-nav">
                <span class="nav-section-title">Overview</span>
                <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                        <rect x="14" y="14" width="7" height="7" rx="1" />
                    </svg>Dashboard</a>
                <span class="nav-section-title">Management</span>
                <a href="doctors.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
                    </svg>Doctors</a>
                <a href="appointments.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>Appointments</a>
                <a href="patients.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>Patients</a>
                <a href="messages.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
                    </svg>Messages</a>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="avatar-sm" id="sidebarAvatar">A</div>
                    <div style="flex:1;min-width:0">
                        <div class="sidebar-user-name" id="sidebarName">Admin</div>
                        <div class="sidebar-user-role">Administrator</div>
                    </div>
                    <button class="logout-btn" onclick="adminLogout()"><svg width="15" height="15" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                            <polyline points="16,17 21,12 16,7" />
                            <line x1="21" y1="12" x2="9" y2="12" />
                        </svg></button>
                </div>
            </div>
        </aside>

        <div class="main-content">
            <header class="topbar">
                <div class="topbar-title">
                    <h1>Appointments</h1>
                    <p>Approve, reject or delete appointments</p>
                </div>
                <div class="topbar-right">
                    <span
                        style="display:inline-flex;align-items:center;gap:7px;background:#dcfce7;color:#166534;
                        border-radius:50px;padding:5px 14px 5px 8px;font-size:12px;font-weight:700;letter-spacing:.5px;margin-right:8px;">
                        <span id="liveDot" style="width:8px;height:8px;border-radius:50%;background:#22c55e;
                            box-shadow:0 0 0 3px rgba(34,197,94,.3);"></span>
                        LIVE
                    </span>
                    <span class="topbar-badge">🔐 Admin</span>
                </div>
            </header>
            <main class="page-content">
                <div class="card">
                    <div class="card-header">
                        <h3>All Appointments (<span id="apptCount">0</span>)</h3>
                        <select id="filterStatus"
                            style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;outline:none;">
                            <option value="">All Status</option>
                            <option>Approved</option>
                            <option>Pending</option>
                            <option>Rejected</option>
                        </select>
                    </div>
                    <div class="card-body" style="padding:0">
                        <div class="table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Patient</th>
                                        <th>Doctor</th>
                                        <th>Specialization</th>
                                        <th>Date</th>
                                        <th>Time</th>
                                        <th>Reason</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="apptBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const admin = getAdmin();
        document.getElementById('sidebarName').textContent = admin.name;
        document.getElementById('sidebarAvatar').textContent = admin.name[0];

        let appts = [];
        let prevCount = -1;

        async function load() {
            const res = await fetch('/admin/api/appointments');
            const data = await res.json();
            appts = (data.appointments || []).reverse();
            if (prevCount >= 0 && appts.length > prevCount) {
                const n = appts.length - prevCount;
                showToast(`📅 ${n} new appointment${n > 1 ? 's' : ''} received!`, 'success');
            }
            prevCount = appts.length;
            const dot = document.getElementById('liveDot');
            if (dot) { dot.style.background = '#fff'; setTimeout(() => dot.style.background = '#22c55e', 300); }
            render(appts);
        }

        function render(list) {
            document.getElementById('apptCount').textContent = list.length;
            const body = document.getElementById('apptBody');
            if (!list.length) { body.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text-muted)">No appointments found.</td></tr>'; return; }
            body.innerHTML = list.map(a => `
      <tr>
        <td><div style="font-weight:600;">${a.patientName}</div><div style="font-size:11px;color:var(--text-muted);">${a.patientEmail}</div></td>
        <td>${a.doctorName}</td>
        <td>${a.specialization}</td>
        <td>${a.date}</td>
        <td>${a.time}</td>
        <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${a.reason}">${a.reason}</td>
        <td><span class="badge ${a.status === 'Approved' ? 'badge-success' : a.status === 'Rejected' ? 'badge-danger' : 'badge-pending'}">${a.status}</span></td>
        <td>
          <div class="action-btns">
            ${a.status !== 'Approved' ? `<button class="btn-success" onclick="setStatus('${a.id}','Approved')">✅ Approve</button>` : ''}
            ${a.status !== 'Rejected' ? `<button class="btn-danger" onclick="setStatus('${a.id}','Rejected')">❌ Reject</button>` : ''}
            <button class="btn-secondary" style="padding:6px 10px;font-size:11px;" onclick="deleteAppt('${a.id}')">🗑️</button>
          </div>
        </td>
      </tr>`).join('');
        }

        document.getElementById('filterStatus').addEventListener('change', function () {
            const v = this.value;
            render(v ? appts.filter(a => a.status === v) : appts);
        });

        async function setStatus(id, status) {
            const res = await fetch('/admin/api/appointments/' + id + '/status', {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status })
            });
            const data = await res.json();
            if (data.success) { showToast('Status updated to ' + status, status === 'Approved' ? 'success' : 'danger'); load(); }
        }

        async function deleteAppt(id) {
            if (!confirm('Delete this appointment?')) return;
            const res = await fetch('/admin/api/appointments/' + id, { method: 'DELETE' });
            if ((await res.json()).success) { showToast('Appointment deleted', 'danger'); load(); }
        }

        load();
        setInterval(load, 5000);
    </script>
</body>

</html>
